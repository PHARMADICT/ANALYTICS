<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#00c896">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="No7 Analytics">
  <title>No7 · Sales Analytics</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>

  <!-- ═══ LOGIN SCREEN ═══ -->
  <div id="screen-login" class="screen active">
    <div class="login-bg">
      <div class="login-card">
        <div class="login-logo">
          <div class="logo-mark">N7</div>
          <div class="login-logo-text">
            <h1>No7 Analytics</h1>
            <p>Dubai Airport T3 · Sales Platform</p>
          </div>
        </div>

        <div class="alert alert-error" id="login-error" hidden></div>

        <div class="field">
          <label class="field-label" for="input-pin">Enter PIN</label>
          <div class="field-input">
            <input class="field-input" type="password" id="input-pin"
              placeholder="····" maxlength="4" inputmode="numeric"
              style="text-align:center;font-size:2rem;letter-spacing:.5em;height:64px">
          </div>
        </div>

        <button class="btn btn-primary btn-full" id="btn-login" style="height:52px;font-size:1rem;margin-top:8px">
          Sign In →
        </button>

        <p class="login-demo-hint" style="margin-top:16px">PIN: <strong>1234</strong></p>
      </div>
    </div>
  </div>

  <!-- ═══ APP SHELL ═══ -->
  <div id="screen-app" class="screen" hidden>

    <!-- Desktop sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo-mark logo-mark-sm">N7</div>
        <div>
          <strong class="sidebar-title">No7 Analytics</strong>
          <span class="sidebar-sub">Dubai Airport T3</span>
        </div>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <div class="user-chip" id="sidebar-user-chip"></div>
        <button class="btn btn-ghost btn-sm btn-full" id="btn-logout-desktop">Sign Out</button>
      </div>
    </aside>

    <!-- Main column -->
    <div class="main-col">

      <!-- Mobile header -->
      <header class="app-header" id="app-header">
        <div class="app-header-left">
          <div class="logo-mark logo-mark-sm">N7</div>
          <div>
            <h2 class="header-title" id="header-title">Entry</h2>
            <p class="header-sub" id="header-sub"></p>
          </div>
        </div>
        <div class="app-header-right">
          <span class="role-badge role-badge-master" id="role-badge">Admin</span>
          <button class="icon-btn" id="btn-checklist-toggle" title="Checklist">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
          </button>
          <button class="icon-btn" id="btn-logout-mobile" title="Logout">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
        </div>
      </header>

      <!-- Checklist panel -->
      <div class="checklist-panel" id="checklist-panel">
        <div class="checklist-panel-inner" id="checklist-panel-inner"></div>
      </div>

      <!-- Sync bar -->
      <div class="sync-bar" id="sync-bar">
        <span class="sync-dot" id="sync-dot"></span>
        <span id="sync-text">Saved locally</span>
      </div>

      <!-- Views -->
      <main class="view-container" id="view-container">
        <div class="view" id="view-entry"></div>
        <div class="view" id="view-analysis"></div>
        <div class="view" id="view-staff"></div>
        <div class="view" id="view-admin"></div>
      </main>

      <!-- Mobile bottom nav -->
      <nav class="bottom-nav" id="bottom-nav"></nav>

    </div>
  </div>

  <!-- Global UI -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <div class="success-overlay" id="success-overlay">
    <div class="success-burst" id="success-burst">🎯</div>
  </div>
  <input type="file" id="camera-input" accept="image/*" capture="environment" hidden>

  <!-- CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

  <script type="module" src="js/app.js"></script>
</body>
</html>
