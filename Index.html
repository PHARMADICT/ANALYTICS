<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#00c896">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="No7 Analytics">
  <title>No7 · Sales Analytics</title>
  <link rel="manifest" href="manifest.json">
  <!-- Styles -->
    <!-- Fonts (CDN — cached after first load) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <!-- Chart.js + Confetti (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  <!-- Inlined styles -->
  <style>
:root {
  --mint:#00c896; --mint-dark:#00a87e; --mint-bright:#00e6ac;
  --mint-bg:#f0fdf8; --mint-card:#e8faf4;
  --mint-soft:rgba(0,200,150,.08); --mint-soft2:rgba(0,200,150,.15);
  --bg:#f4f8f6; --surface:#ffffff;
  --border:#e2ece8; --border-mid:#c8ddd5;
  --text:#1a2e26; --text-2:#4a6b5e; --text-3:#8aada0;
  --red:#f05050; --red-bg:rgba(240,80,80,.08);
  --amber:#f5a623; --amber-bg:rgba(245,166,35,.10);
  --blue:#4a90d9; --blue-bg:rgba(74,144,217,.10);
  --purple:#8b5cf6; --purple-bg:rgba(139,92,246,.10);
  --shadow-sm:0 1px 4px rgba(0,60,40,.06),0 4px 16px rgba(0,60,40,.04);
  --shadow-md:0 2px 8px rgba(0,60,40,.10),0 8px 32px rgba(0,60,40,.06);
  --font-sans:'Cabinet Grotesk',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --r-sm:6px; --r:10px; --r-lg:14px; --r-pill:999px;
  --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:20px; --sp-6:24px;
  --header-h:56px; --nav-h:64px; --sidebar-w:220px;
  --safe-b:env(safe-area-inset-bottom,0px);
  --t-fast:150ms ease; --t-normal:250ms ease; --t-spring:400ms cubic-bezier(.16,1,.3,1);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:var(–font-sans);font-size:16px;color:var(–text);background:var(–bg);-webkit-font-smoothing:antialiased}
input,button,select,textarea{font-family:inherit;font-size:inherit}
button{cursor:pointer} img{max-width:100%;display:block} a{color:var(–mint-dark);text-decoration:none}
::-webkit-scrollbar{width:4px;height:4px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:var(–border-mid);border-radius:4px}
h1,h2,h3,h4{font-weight:800;line-height:1.2}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
.mono{font-family:var(–font-mono)}

/* ── Screens ── */
.screen{position:fixed;inset:0;display:flex}
.screen[hidden]{display:none!important}

/* ── Login ── */
.login-bg{flex:1;background:linear-gradient(160deg,#f0fdf8 0%,#e0f7ef 45%,#d4f0e6 100%);display:flex;align-items:center;justify-content:center;padding:var(–sp-5)}
.login-card{background:var(–surface);border-radius:20px;padding:36px 28px;box-shadow:var(–shadow-md);width:100%;max-width:380px;position:relative;overflow:hidden}
.login-card::before{content:’’;position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(–mint),var(–mint-bright))}
.login-logo{display:flex;align-items:center;gap:var(–sp-3);margin-bottom:var(–sp-6)}
.login-logo-text h1{font-size:1.15rem;color:var(–text)}
.login-logo-text p{font-size:.65rem;color:var(–text-3);margin-top:2px}
.login-demo-hint{text-align:center;font-size:.62rem;color:var(–text-3);margin-top:var(–sp-4)}

/* ── App shell ── */
#screen-app{flex-direction:row}
.sidebar{width:var(–sidebar-w);flex-shrink:0;background:var(–surface);border-right:1px solid var(–border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{display:flex;align-items:center;gap:var(–sp-3);padding:18px 16px;border-bottom:1px solid var(–border)}
.sidebar-title{display:block;font-size:.88rem;font-weight:800}
.sidebar-sub{display:block;font-size:.58rem;color:var(–text-3)}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(–border);display:flex;flex-direction:column;gap:8px}
.sidebar-nav-item{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;border-radius:var(–r);border:none;background:none;text-align:left;font-size:.82rem;font-weight:600;color:var(–text-2);cursor:pointer;transition:all var(–t-fast);margin-bottom:2px}
.sidebar-nav-item svg{width:17px;height:17px;flex-shrink:0}
.sidebar-nav-item:hover{background:var(–mint-bg);color:var(–mint-dark)}
.sidebar-nav-item.active{background:var(–mint-soft2);color:var(–mint-dark)}
.main-col{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.app-header{background:var(–surface);border-bottom:1px solid var(–border);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:30}
.app-header-left{display:flex;align-items:center;gap:10px}
.app-header-right{display:flex;align-items:center;gap:6px}
.header-title{font-size:.9rem;font-weight:800}
.header-sub{font-size:.6rem;color:var(–text-3);margin-top:1px}
.checklist-panel{background:var(–surface);border-bottom:2px solid var(–mint);box-shadow:0 8px 24px rgba(0,60,40,.12);max-height:0;overflow:hidden;transition:max-height var(–t-spring);flex-shrink:0;z-index:25}
.checklist-panel.open{max-height:60vh;overflow-y:auto}
.checklist-panel-inner{padding:16px}
.sync-bar{display:flex;align-items:center;gap:6px;padding:5px 14px;background:var(–mint-card);border-bottom:1px solid rgba(0,200,150,.15);font-size:.62rem;font-weight:600;color:var(–mint-dark);flex-shrink:0}
.sync-bar.offline{background:var(–amber-bg);color:var(–amber)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(–mint);animation:pulse-dot 2s infinite}
.sync-bar.offline .sync-dot{background:var(–amber)}
.view-container{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(–nav-h) + var(–safe-b) + 8px)}
.view{display:none} .view.active{display:block}
.view-pad{padding:var(–sp-4)}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(–nav-h) + var(–safe-b));background:var(–surface);border-top:1px solid var(–border);display:flex;align-items:flex-start;padding-top:8px;z-index:40;box-shadow:0 -4px 16px rgba(0,60,40,.06)}
.bottom-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(–text-3);font-size:.56rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;transition:color var(–t-fast);padding:0 4px}
.bottom-nav-item svg{width:22px;height:22px;stroke-width:1.8}
.bottom-nav-item.active{color:var(–mint-dark)}
.nav-pip{width:4px;height:4px;border-radius:50%;background:var(–mint-dark);opacity:0;transition:opacity var(–t-fast)}
.bottom-nav-item.active .nav-pip{opacity:1}
.logo-mark{width:46px;height:46px;background:linear-gradient(135deg,var(–mint),var(–mint-dark));border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:var(–font-mono);font-weight:700;font-size:1rem;color:#fff;flex-shrink:0}
.logo-mark-sm{width:32px;height:32px;border-radius:8px;font-size:.72rem}
.user-chip{font-size:.66rem;color:var(–text-3);font-weight:500;padding:2px 0}
@media(max-width:767px){.sidebar{display:none}}
@media(min-width:768px){.bottom-nav,.app-header{display:none}.view-container{padding-bottom:var(–sp-6)}}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;height:48px;padding:0 18px;border-radius:var(–r);border:none;font-family:var(–font-sans);font-weight:700;font-size:.88rem;cursor:pointer;transition:transform var(–t-fast),box-shadow var(–t-fast);white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,var(–mint),var(–mint-dark));color:#fff}
.btn-primary:hover{box-shadow:0 4px 12px rgba(0,200,150,.3)}
.btn-outline{background:var(–surface);border:1.5px solid var(–border-mid);color:var(–text-2)}
.btn-outline:hover{border-color:var(–mint);color:var(–mint-dark)}
.btn-ghost{background:none;color:var(–text-2);border:none}
.btn-ghost:hover{background:var(–bg)}
.btn-danger{background:var(–red-bg);color:var(–red);border:1px solid rgba(240,80,80,.2)}
.btn-wa{background:#25d366;color:#fff}
.btn-full{width:100%} .btn-sm{height:34px;font-size:.76rem;padding:0 12px} .btn-single{margin-top:10px}
.icon-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:var(–r);border:1px solid var(–border);background:var(–surface);color:var(–text-2);cursor:pointer;transition:all var(–t-fast)}
.icon-btn svg{width:18px;height:18px}
.icon-btn:hover{background:var(–mint-bg);border-color:var(–mint);color:var(–mint-dark)}
/* Cards */
.card{background:var(–surface);border:1px solid var(–border);border-radius:var(–r-lg);padding:var(–sp-4);box-shadow:var(–shadow-sm);margin-bottom:10px}
.card-accent{position:relative;overflow:hidden}
.card-accent::before{content:’’;position:absolute;top:0;left:0;right:0;height:3px}
.card-accent-mint::before{background:linear-gradient(90deg,var(–mint),var(–mint-bright))}
.card-accent-blue::before{background:var(–blue)}
.card-accent-amber::before{background:var(–amber)}
.card-accent-red::before{background:var(–red)}
.card-accent-purple::before{background:var(–purple)}
/* KPI cards */
.kpi-card{background:var(–surface);border:1px solid var(–border);border-radius:var(–r-lg);padding:12px 14px;box-shadow:var(–shadow-sm)}
.kpi-label{font-size:.56rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(–text-3);margin-bottom:5px}
.kpi-value{font-family:var(–font-mono);font-size:1.45rem;font-weight:700;line-height:1}
.kpi-card-mint .kpi-value{color:var(–mint-dark)} .kpi-card-blue .kpi-value{color:var(–blue)} .kpi-card-amber .kpi-value{color:var(–amber)} .kpi-card-red .kpi-value{color:var(–red)} .kpi-card-purple .kpi-value{color:var(–purple)}
.kpi-sub{font-size:.58rem;color:var(–text-3);margin-top:4px;font-family:var(–font-mono)}
/* Forms */
.field{margin-bottom:10px}
.field-label{display:block;font-size:.62rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(–text-2);margin-bottom:5px}
.field-label-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.field-input{position:relative}
.field-input input,.field-input select{width:100%;height:46px;background:var(–bg);border:1.5px solid var(–border);border-radius:var(–r);padding:0 14px;font-size:.95rem;font-family:var(–font-mono);color:var(–text);outline:none;transition:border-color var(–t-fast),background var(–t-fast);-webkit-appearance:none}
.field-input input:focus,.field-input select:focus{border-color:var(–mint);background:var(–surface)}
.field-suffix{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-family:var(–font-mono);font-size:.65rem;font-weight:600;color:var(–amber);pointer-events:none}
.prev-chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.prev-chip{font-size:.58rem;font-family:var(–font-mono);background:var(–bg);border:1px solid var(–border);border-radius:4px;padding:2px 7px;color:var(–text-2)}
.prev-chip strong{color:var(–text)}
/* Grids */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.g4{display:grid;grid-template-columns:1fr 1fr;gap:9px}
/* Section label */
.section-label{display:flex;align-items:center;gap:8px;font-size:.58rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(–text-3);margin:18px 0 10px}
.section-label:first-child{margin-top:0}
.section-label::after{content:’’;flex:1;height:1px;background:var(–border)}
/* Progress */
.pbar-wrap{margin-top:8px}
.pbar-track{height:5px;background:var(–bg);border-radius:5px;overflow:hidden}
.pbar-fill{height:100%;border-radius:5px;transition:width .5s cubic-bezier(.16,1,.3,1)}
.pbar-labels{display:flex;justify-content:space-between;font-size:.56rem;color:var(–text-3);font-family:var(–font-mono);margin-top:3px}
/* Badges */
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:var(–r-pill);font-size:.58rem;font-weight:700;font-family:var(–font-mono)}
.badge-mint{background:var(–mint-soft2);color:var(–mint-dark)} .badge-red{background:var(–red-bg);color:var(–red)} .badge-amber{background:var(–amber-bg);color:var(–amber)} .badge-blue{background:var(–blue-bg);color:var(–blue)} .badge-purple{background:var(–purple-bg);color:var(–purple)}
.role-badge{padding:3px 9px;border-radius:var(–r-pill);font-size:.6rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.role-badge-staff{background:var(–blue-bg);color:var(–blue)} .role-badge-master{background:var(–mint-soft2);color:var(–mint-dark)}
/* Alert */
.alert{padding:10px 14px;border-radius:var(–r);font-size:.78rem;font-weight:500;margin-bottom:12px}
.alert-error{background:var(–red-bg);border:1px solid rgba(240,80,80,.2);color:var(–red)}
/* Tabs */
.tab-group{display:grid;grid-template-columns:1fr 1fr;gap:5px;background:var(–bg);border-radius:var(–r);padding:4px;margin-bottom:20px}
.tab{padding:9px;border-radius:6px;border:none;background:none;font-size:.78rem;font-weight:600;color:var(–text-3);transition:all var(–t-fast)}
.tab.active{background:var(–surface);color:var(–mint-dark);box-shadow:0 1px 4px rgba(0,60,40,.1)}
/* Toggle */
.toggle{width:40px;height:22px;background:var(–border-mid);border-radius:11px;position:relative;cursor:pointer;transition:background var(–t-normal);flex-shrink:0;border:none}
.toggle.on{background:var(–mint)}
.toggle::after{content:’’;position:absolute;width:16px;height:16px;background:white;border-radius:50%;top:3px;left:3px;transition:transform var(–t-normal);box-shadow:0 1px 3px rgba(0,0,0,.15)}
.toggle.on::after{transform:translateX(18px)}
/* Day pills */
.day-pills{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none}
.day-pills::-webkit-scrollbar{display:none}
.day-pill{flex-shrink:0;padding:7px 13px;border-radius:var(–r-pill);font-size:.7rem;font-weight:700;border:1.5px solid var(–border);background:var(–surface);color:var(–text-2);transition:all var(–t-fast);position:relative}
.day-pill.active{background:var(–mint);border-color:var(–mint);color:white}
.day-pill.has-data::after{content:’’;position:absolute;top:3px;right:3px;width:5px;height:5px;border-radius:50%;background:var(–amber);border:1.5px solid white}
.day-pill.active.has-data::after{border-color:var(–mint)}
/* Week banner */
.week-banner{background:linear-gradient(135deg,var(–mint-dark),#008f68);border-radius:var(–r-lg);padding:var(–sp-4);color:white;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.week-banner-left h3{font-size:1.05rem;font-weight:800}
.week-banner-left p{font-size:.65rem;opacity:.8;margin-top:2px}
.week-banner-right{text-align:right}
.week-banner-bp{font-family:var(–font-mono);font-size:1.25rem;font-weight:700}
.week-banner-bp-lbl{font-size:.58rem;opacity:.8}
/* Accum */
.accum-card{background:var(–mint-card);border:1px solid rgba(0,200,150,.2);border-radius:var(–r-lg);padding:12px 14px;margin-bottom:10px}
.accum-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.accum-label{font-size:.62rem;font-weight:700;color:var(–mint-dark);text-transform:uppercase;letter-spacing:.08em}
.accum-value{font-family:var(–font-mono);font-size:1.1rem;font-weight:700;color:var(–mint-dark)}
/* Photo/OCR */
.photo-preview{border-radius:var(–r);overflow:hidden;background:var(–bg);border:1px solid var(–border);margin-top:8px;display:none}
.photo-preview.show{display:block}
.photo-preview img{width:100%}
.photo-preview-actions{padding:8px 10px;display:flex;gap:8px;border-top:1px solid var(–border)}
.ocr-panel{padding:10px 12px;background:var(–mint-card);border:1px solid rgba(0,200,150,.2);border-radius:var(–r);font-size:.75rem;margin-top:8px;display:none}
.ocr-panel.show{display:block}
.ocr-field-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(0,200,150,.1)}
.ocr-field-row:last-child{border-bottom:none}
.ocr-field-label{font-size:.64rem;color:var(–text-2);font-weight:600}
.ocr-field-value{font-family:var(–font-mono);font-size:.7rem;color:var(–mint-dark);font-weight:600}
.ocr-confidence{font-size:.52rem;color:var(–text-3)}
/* Division */
.division-split{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.div-card{border-radius:var(–r-lg);padding:14px}
.div-card-a{background:linear-gradient(135deg,#e8f7f2,#d4f0e6);border:1px solid rgba(0,200,150,.2)}
.div-card-b{background:linear-gradient(135deg,#eef4ff,#ddeaff);border:1px solid rgba(74,144,217,.2)}
.div-card-label{font-size:.56rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.div-card-a .div-card-label{color:var(–mint-dark)} .div-card-b .div-card-label{color:var(–blue)}
.div-card-value{font-family:var(–font-mono);font-size:1.3rem;font-weight:700}
.div-card-a .div-card-value{color:var(–mint-dark)} .div-card-b .div-card-value{color:var(–blue)}
.div-card-pct{font-size:.64rem;margin-top:3px}
.div-card-a .div-card-pct{color:var(–mint-dark)} .div-card-b .div-card-pct{color:var(–blue)}
/* Forecast */
.forecast-card{background:linear-gradient(135deg,#f0fdf8,#e6f9f2);border:1px solid rgba(0,200,150,.2);border-radius:var(–r-lg);padding:var(–sp-4);margin-bottom:10px}
.forecast-title{font-size:.66rem;font-weight:700;color:var(–mint-dark);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.forecast-main{font-size:1.5rem;font-weight:800;color:var(–text);font-family:var(–font-mono)}
.forecast-sub{font-size:.75rem;color:var(–text-2);margin-top:5px;line-height:1.5}
.forecast-badge{display:inline-flex;align-items:center;gap:4px;font-family:var(–font-mono);font-size:.85rem;font-weight:700;padding:4px 10px;border-radius:var(–r);margin-top:8px}
.forecast-badge-good{background:var(–mint-soft2);color:var(–mint-dark)} .forecast-badge-warn{background:var(–amber-bg);color:var(–amber)} .forecast-badge-danger{background:var(–red-bg);color:var(–red)}
/* Charts */
.chart-card{background:var(–surface);border:1px solid var(–border);border-radius:var(–r-lg);padding:var(–sp-4);box-shadow:var(–shadow-sm);margin-bottom:10px}
.chart-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.chart-card-title{font-size:.76rem;font-weight:700;color:var(–text)}
.chart-card-sub{font-size:.6rem;color:var(–text-3)}
.chart-wrap{position:relative;height:175px}
/* Staff */
.staff-card{background:var(–surface);border:1px solid var(–border);border-radius:var(–r-lg);padding:14px var(–sp-4);box-shadow:var(–shadow-sm);margin-bottom:10px}
.staff-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.staff-info{display:flex;align-items:center;gap:10px}
.staff-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;font-weight:700;flex-shrink:0}
.staff-name{font-size:.86rem;font-weight:700} .staff-role{font-size:.6rem;color:var(–text-3);margin-top:1px}
.staff-nums{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;background:var(–bg);border-radius:var(–r);padding:10px;margin-bottom:10px}
.staff-num{text-align:center}
.staff-num-value{font-family:var(–font-mono);font-size:.88rem;font-weight:700}
.staff-num-label{font-size:.52rem;color:var(–text-3);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}

/** js/utils/calc.js — Pure KPI math. No DOM. Unit-testable. */
function calcDayKPIs(e,ctx) {
  const {sales,trn,items,no7,aura}=e;
  const {dayBP,n7DayBP,kdRate,divAPercent}=ctx;
  const kd=kdRate||11.99, divA=(divAPercent||60)/100;
  const atv=safe(sales/trn), ipc=safe(items/trn);
  const no7Vat=no7!=null?no7*0.95:null, no7Pct=safe(no7/sales*100), auraPct=safe(aura/trn*100);
  const achPct=sales!=null&&dayBP?safe(sales/dayBP*100):null, gap=sales!=null&&dayBP!=null?sales-dayBP:null;
  const n7AchPct=safe(no7/n7DayBP*100);
  return{ sales,trn,items,no7,aura, atv,ipc,conv:ipc, no7Vat,no7Pct,auraPct, achPct,gap,n7AchPct,
    kdSales:safe(sales/kd), kdNo7:safe(no7/kd), kdAtv:safe(atv/kd),
    divAValue:sales!=null?sales*divA:null, divBValue:sales!=null?sales*(1-divA):null,
    divAPct:divA*100, divBPct:(1-divA)*100 };
}
function calcWeekKPIs(entries,ctx) {
  const {weekBP,n7WeekBP}=ctx; const valid=entries.filter(Boolean);
  const wkSales=sum(valid,'sales'),wkNo7=sum(valid,'no7'),wkTrn=sum(valid,'trn'),wkItems=sum(valid,'items'),wkAura=sum(valid,'aura');
  const sfas=valid.filter(e=>e.sfa!=null).map(e=>e.sfa);
  const with$=valid.filter(e=>e.sales>0);
  const best=with$.reduce((a,b)=>b.sales>(a?.sales||0)?b:a,null);
  const worst=with$.reduce((a,b)=>b.sales<(a?.sales??Infinity)?b:a,null);
  return{ wkSales,wkNo7,wkTrn,wkItems,wkAura,
    wkAtv:safe(wkSales/wkTrn), wkIpc:safe(wkItems/wkTrn),
    wkNo7Pct:safe(wkNo7/wkSales*100), wkAuraPct:safe(wkAura/wkTrn*100),
    wkAchPct:safe(wkSales/weekBP*100), wkN7AchPct:safe(wkNo7/n7WeekBP*100),
    wkGap:weekBP!=null&&wkSales!=null?wkSales-weekBP:null,
    avgSfa:sfas.length?sfas.reduce((a,b)=>a+b,0)/sfas.length:null,
    bestDay:best?._day||null, bestSales:best?.sales||null,
    worstDay:worst?._day||null, worstSales:worst?.sales||null,
    daysEntered:with$.length };
}
function calcForecast(entries,weekBP,total=7){
  const with$=entries.filter(e=>e?.sales>0); if(!with$.length) return null;
  const totalSales=sum(with$,'sales'), avg=totalSales/with$.length, proj=avg*total;
  return{ projected:proj, avgPerDay:avg, projectedPct:weekBP?(proj/weekBP)*100:null, daysIn:with$.length, daysLeft:total-with$.length, totalSoFar:totalSales };
}
function safe(n){ return isFinite(n)&&n!=null?n:null; }
function sum(arr,k){ return arr.reduce((a,e)=>a+(e?.[k]||0),0); }
function achColor(pct){ if(pct==null) return 'var(--text-2)'; return pct>=100?'var(--mint-dark)':pct>=85?'var(--amber)':'var(--red)'; }
function achBadgeClass(pct){ if(pct==null) return 'badge-blue'; return pct>=100?'badge-mint':pct>=85?'badge-amber':'badge-red'; }
function forecastBadgeClass(pct){ if(pct==null) return ''; return pct>=100?'forecast-badge-good':pct>=85?'forecast-badge-warn':'forecast-badge-danger'; }

/**
 * js/views/login.js — Simple PIN login. One screen, one PIN.
 */



function initLogin(onSuccess) {
  const input = document.getElementById('input-pin');
  const btn   = document.getElementById('btn-login');
  const err   = document.getElementById('login-error');

  const attempt = () => {
    const pin = input?.value?.trim() || '';
    const result = verifyPin(pin);
    if (result.ok) {
      setAuth({ loggedIn: true, role: result.role, user: result.user });
      onSuccess(result);
    } else {
      if (err) { err.textContent = result.error; err.hidden = false; }
      if (input) { input.value = ''; input.focus(); }
      shake();
    }
  };

  btn?.addEventListener('click', attempt);
  input?.addEventListener('keydown', e => { if (e.key === 'Enter') attempt(); });

  // Auto-focus PIN field
  setTimeout(() => input?.focus(), 100);
}

function shake() {
  const card = document.querySelector('.login-card');
  if (!card) return;
  card.style.animation = 'none';
  requestAnimationFrame(() => {
    card.style.animation = 'shake 0.35s ease';
    setTimeout(() => card.style.animation = '', 400);
  });
}

// ── Event binding ─────────────────────────────────────
function bindEvents() {
  // Inputs → live calc
  const inputs = ['f-sales','f-trn','f-sfa','f-items','f-no7','f-no7trn','f-aura','f-csat','f-focus'];
  inputs.forEach(id => el(id)?.addEventListener('input', debounce(liveCalc, 150)));

  // Camera
  el('btn-camera')?.addEventListener('click', () => el('camera-input').click());
  el('btn-retake')?.addEventListener('click', () => {
    el('photo-preview').classList.remove('show');
    el('ocr-panel').classList.remove('show');
  });
  el('btn-parse')?.addEventListener('click', handleParse);
  el('btn-apply-ocr')?.addEventListener('click', applyOcrFields);

  // Camera input change
  el('camera-input')?.addEventListener('change', handleCameraCapture);

  // Save / clear
  el('btn-save-entry')?.addEventListener('click', saveEntry);
  el('btn-clear-entry')?.addEventListener('click', clearEntry);

  // WhatsApp
  el('btn-whatsapp')?.addEventListener('click', shareWhatsApp);

  // Feature visibility
  applyFeatureToggles();
}

// ── Day pills ─────────────────────────────────────────
function renderDayPills() {
  const { weekNum } = store.settings;
  const container = el('day-pills');
  if (!container) return;

  container.innerHTML = DAYS.map(day => {
    const entry = db.getEntry(weekNum, day);
    const hasData = entry && entry.sales != null;
    const active  = day === store.settings.currentDay;
    return `<button class="day-pill ${active?'active':''} ${hasData?'has-data':''}"
      data-day="${day}">${day}</button>`;
  }).join('');

  container.querySelectorAll('.day-pill').forEach(btn => {
    btn.addEventListener('click', () => {
      saveSettings({ currentDay: btn.dataset.day });
      refreshDay();
    });
  });
}

// ── Load day into form ────────────────────────────────
function loadDay() {
  const { weekNum, currentDay } = store.settings;
  const entry = db.getEntry(weekNum, currentDay) || {};
  const fields = ['sales','trn','sfa','items','no7','no7trn','aura','csat','focus'];
  fields.forEach(f => setVal('f-'+f, entry[f]));
  showPrevData(currentDay);
  updateTimestamp(entry);
  liveCalc();
}

function showPrevData(day) {
  const { weekNum } = store.settings;
  // Last week same day
  const lw = db.getEntry(weekNum - 1, day) || {};
  const prevSalesEl = el('prev-sales');
  const prevTrnEl   = el('prev-trn');
  if (prevSalesEl) prevSalesEl.innerHTML = lw.sales != null
    ? `<span class="prev-chip">LW ${day}: <strong>AED ${fmtAED(lw.sales)}</strong></span>` : '';
  if (prevTrnEl) prevTrnEl.innerHTML = lw.trn != null
    ? `<span class="prev-chip">LW TRN: <strong>${fmtAED(lw.trn,0)}</strong></span>` : '';
}

function updateTimestamp(entry) {
  const tsEl = el('entry-ts');
  if (!tsEl) return;
  tsEl.textContent = entry.updatedAt
    ? `Last saved: ${fmtDateTime(entry.updatedAt)} · by ${entry.enteredBy || 'Staff'}`
    : '';
}

// ── Header update ─────────────────────────────────────
function updateHeader() {
  const { weekNum, currentDay } = store.settings;
  const di   = DAYS.indexOf(currentDay);
  const now  = new Date();
  setText('wb-week', `Week ${weekNum} · 2026`);
  setText('wb-day', `${DAYS_FULL[di >= 0 ? di : 0]}, ${now.toLocaleDateString('en-AE',{day:'2-digit',month:'short'})}`);
  const dayBP = getDayBP(weekNum, currentDay) || store.settings.dbpOverride;
  setText('wb-bp', dayBP ? 'AED ' + fmtAED(dayBP) : 'AED —');
  document.getElementById('header-title').textContent = 'Entry';
}

// ── Live calculation ──────────────────────────────────
function liveCalc() {
  const { weekNum, currentDay, kdRate, divAPercent, n7DailyBP, n7WeeklyBP, features } = store.settings;
  const dayBP  = getDayBP(weekNum, currentDay) || store.settings.dbpOverride;
  const weekBP = getWeekBP(weekNum) || store.settings.wbpOverride;

  const rawEntry = {
    sales: gNum('f-sales'), trn: gNum('f-trn'), sfa: gNum('f-sfa'),
    items: gNum('f-items'), no7: gNum('f-no7'), no7trn: gNum('f-no7trn'),
    aura: gNum('f-aura'), csat: gNum('f-csat'), focus: gNum('f-focus'),
  };
  const kpis = calcDayKPIs(rawEntry, { dayBP, n7DayBP: n7DailyBP, kdRate, divAPercent });

  // Mini KPIs
  setText('kv-atv',  kpis.atv  ? fmtAED(Math.round(kpis.atv))  : '—');
  setText('kv-ipc',  kpis.ipc  ? kpis.ipc.toFixed(2)             : '—');
  setText('kv-conv', kpis.conv ? kpis.conv.toFixed(2)            : '—');

  // Sales hero
  const salesEl = el('sales-hero-val');
  if (salesEl) salesEl.textContent = rawEntry.sales != null ? `AED ${fmtAED(rawEntry.sales)}` : 'AED —';
  setText('sales-hero-sub', dayBP
    ? `Target: AED ${fmtAED(dayBP)} · Gap: ${kpis.gap != null ? (kpis.gap >= 0 ? '+' : '') + fmtAED(Math.round(kpis.gap)) : '—'}`
    : 'Set BP in Admin');
  const heroCard = el('sales-hero');
  if (heroCard) {
    heroCard.className = `card card-accent ${kpis.achPct >= 100 ? 'card-accent-mint' : kpis.achPct >= 85 ? 'card-accent-amber' : 'card-accent-red'}`;
  }
  const badge = el('sales-badge');
  if (badge) { badge.textContent = fmtPct(kpis.achPct); badge.className = 'badge ' + achBadgeClass(kpis.achPct); }
  const pbarEl = el('sales-hero-pbar');
  if (pbarEl) pbarEl.hidden = rawEntry.sales == null;
  setBar('sales-hero-fill', kpis.achPct, achColor(kpis.achPct));
  setText('sales-hero-bp-lbl', dayBP ? fmtAED(dayBP) : '');

  // KD suffixes (inline)
  const kdS = el('kd-sales'); if (kdS) kdS.textContent = rawEntry.sales ? (rawEntry.sales / kdRate).toFixed(1) + ' KD' : '';
  const kdN = el('kd-no7');   if (kdN) kdN.textContent = rawEntry.no7   ? (rawEntry.no7   / kdRate).toFixed(1) + ' KD' : '';

  // No7 block
  setText('kv-no7',    rawEntry.no7 != null ? `AED ${fmtAED(rawEntry.no7)}` : 'AED —');
  setText('kv-no7vat', kpis.no7Vat != null  ? `AED ${fmtAED(Math.round(kpis.no7Vat))}` : 'AED —');
  const n7pctEl = el('kv-no7pct');
  if (n7pctEl) { n7pctEl.textContent = fmtPct(kpis.no7Pct); n7pctEl.style.color = achColor(kpis.no7Pct); }
  setText('kv-n7dpct', `${fmtPct(kpis.n7AchPct)} of No7 BP`);
  setBar('no7-bar', kpis.n7AchPct, 'var(--blue)');

  // Week accumulative
  const wkEntries = DAYS.map(d => {
    if (d === currentDay) return { ...rawEntry, _day: d };
    return { ...(db.getEntry(weekNum, d) || {}), _day: d };
  });
  const wkKPIs = calcWeekKPIs(wkEntries, { weekBP, n7WeekBP: n7WeeklyBP, kdRate });
  const accumCard = el('accum-card');
  if (accumCard) accumCard.hidden = wkKPIs.wkSales <= 0;
  setText('accum-value', `AED ${fmtAED(wkKPIs.wkSales)}`);
  setText('accum-pct', fmtPct(wkKPIs.wkAchPct));
  setText('accum-bp-lbl', weekBP ? `of AED ${fmtAED(weekBP)}` : 'of Week BP');
  setBar('accum-bar', wkKPIs.wkAchPct, achColor(wkKPIs.wkAchPct));
  setText('kv-n7wktot', wkKPIs.wkNo7 > 0 ? `Wk total: AED ${fmtAED(wkKPIs.wkNo7)}` : '');

  // AURA
  setText('kv-aura',     rawEntry.aura != null ? fmtAED(rawEntry.aura, 0) : '—');
  setText('kv-aura-trn', rawEntry.trn  != null ? fmtAED(rawEntry.trn, 0)  : '—');
  setText('kv-aura-pct', fmtPct(kpis.auraPct));

  // KD strip
  setText('kd-total',   fmtKD(rawEntry.sales, kdRate));
  setText('kd-no7-val', fmtKD(rawEntry.no7,   kdRate));
  setText('kd-atv-val', fmtKD(kpis.atv,       kdRate));

  // Division split
  if (rawEntry.sales != null) {
    setText('div-a-val', `AED ${fmtAED(Math.round(kpis.divAValue))}`);
    setText('div-b-val', `AED ${fmtAED(Math.round(kpis.divBValue))}`);
    setText('div-a-pct', `${kpis.divAPct.toFixed(0)}% of total`);
    setText('div-b-pct', `${kpis.divBPct.toFixed(0)}% of total`);
    setBar('div-a-bar', kpis.divAPct,  'var(--mint)');
    setBar('div-b-bar', kpis.divBPct,  'var(--blue)');
  }

  // Confetti if target beaten
  if (kpis.achPct >= 100 && features.confetti && rawEntry.sales != null) {
    celebrate('🎯');
  }

  autoSave(rawEntry);
}

// ── Auto-save ─────────────────────────────────────────
function autoSave(rawEntry) {
  if (Object.values(rawEntry).every(v => v == null)) return;
  const { weekNum, currentDay } = store.settings;
  db.saveEntry(weekNum, currentDay, {
    ...rawEntry,
    enteredBy: store.auth.user,
    createdAt: db.getEntry(weekNum, currentDay)?.createdAt || new Date().toISOString(),
  });
}

// ── Save entry ────────────────────────────────────────
function saveEntry() {
  const { weekNum, currentDay } = store.settings;
  const entry = db.getEntry(weekNum, currentDay);
  addAuditEntry('entry_saved', `${currentDay} Wk${weekNum} · Sales: AED ${fmtAED(entry?.sales)}`,
    store.auth.user, store.auth.role);
  renderDayPills();
  toast('✓ Entry saved', 'success');
}

// ── Clear form ────────────────────────────────────────
function clearEntry() {
  ['f-sales','f-trn','f-sfa','f-items','f-no7','f-no7trn','f-aura','f-csat','f-focus'].forEach(id => {
    const e = el(id); if (e) e.value = '';
  });
  liveCalc();
  toast('Cleared');
}

// ── Camera / OCR ──────────────────────────────────────
let ocrFields = [];

async function handleCameraCapture(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    el('photo-img').src = ev.target.result;
    el('photo-preview').classList.add('show');
    el('ocr-panel').classList.remove('show');
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

async function handleParse() {
  const img = el('photo-img');
  if (!img?.src || img.src === window.location.href) { toast('No photo captured', 'error'); return; }
  toast('🔍 Parsing image…', '', 3000);
  try {
    // Convert img src to blob for API
    const blob = await fetch(img.src).then(r => r.blob());
    const result = await parseImage(blob);
    ocrFields = result.fields;
    renderOcrFields(result.fields);
    el('ocr-panel').classList.add('show');
    toast(`${result.fields.length} fields detected`, 'success');
    addAuditEntry('ocr_parsed', `${result.fields.length} fields from photo`, store.auth.user, store.auth.role);
  } catch (err) {
    toast('Parse failed: ' + err.message, 'error');
  }
}

function renderOcrFields(fields) {
  const container = el('ocr-fields');
  if (!container) return;
  container.innerHTML = fields.map(f => `
    <div class="ocr-field-row">
      <span class="ocr-field-label">${f.label}</span>
      <div style="text-align:right">
        <div class="ocr-field-value">${f.value}</div>
        <div class="ocr-confidence">Confidence: ${(f.confidence * 100).toFixed(0)}%</div>
      </div>
    </div>`).join('');
}

function applyOcrFields() {
  ocrFields.forEach(f => setVal('f-' + f.key, f.rawValue));
  el('ocr-panel').classList.remove('show');
  liveCalc();
  toast('✓ Fields applied', 'success');
  addAuditEntry('ocr_applied', 'Auto-filled from photo', store.auth.user, store.auth.role);
}

// ── WhatsApp share ────────────────────────────────────
function shareWhatsApp() {
  const { weekNum, currentDay, kdRate, n7DailyBP } = store.settings;
  const entry = db.getEntry(weekNum, currentDay) || {};
  const dayBP = getDayBP(weekNum, currentDay);
  const achPct = entry.sales && dayBP ? ((entry.sales / dayBP) * 100).toFixed(1) : '—';
  const atv    = entry.sales && entry.trn ? (entry.sales / entry.trn).toFixed(0) : '—';
  const n7pct  = entry.no7 && entry.sales ? ((entry.no7 / entry.sales) * 100).toFixed(2) : '—';
  const aurpct = entry.aura && entry.trn  ? ((entry.aura / entry.trn) * 100).toFixed(1) : '—';
  const ts     = fmtDateTime(new Date().toISOString());
  const msg =
    `*Daily Sales Report · Wk ${weekNum} | ${currentDay}*\n` +
    `Store: ${store.settings.store}\nTime: ${ts}\n\n` +
    `📊 *Sales*\n` +
    `• Sales: AED ${fmtAED(entry.sales)} / ${fmtAED(dayBP)} (${achPct}%)\n` +
    `• TRN: ${fmtAED(entry.trn,0)} | ATV: AED ${atv} | SFA: ${entry.sfa||'—'}%\n` +
    `• KD: ${fmtKD(entry.sales, kdRate)}\n\n` +
    `🔵 *No7*\n` +
    `• Sales: AED ${fmtAED(entry.no7)} (${n7pct}% of total)\n` +
    `• VAT -5%: AED ${entry.no7 ? fmtAED(Math.round(entry.no7*0.95)) : '—'}\n\n` +
    `💚 *AURA*\n` +
    `• ${fmtAED(entry.aura,0)} / ${fmtAED(entry.trn,0)} TRN = ${aurpct}%\n\n` +
    `_Entered by: ${store.auth.user}_`;

  window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
  addAuditEntry('whatsapp_share', `${currentDay} data shared`, store.auth.user, store.auth.role);
}

// ── Build all ─────────────────────────────────────────
function buildAll() {
  const { weekNum, n7WeeklyBP } = store.settings;
  const weekBP  = getWeekBP(weekNum) || store.settings.wbpOverride;
  const kdRate  = store.settings.kdRate;

  const wkEntries = DAYS.map(d => ({ ...(db.getEntry(weekNum, d) || {}), _day: d }));
  const wkKPIs = calcWeekKPIs(wkEntries, { weekBP, n7WeekBP: n7WeeklyBP, kdRate });

  setText('an-wk', weekNum);
  setText('an-best-day',  wkKPIs.bestDay  || '—');
  setText('an-best-val',  wkKPIs.bestSales  != null ? 'AED ' + fmtAED(wkKPIs.bestSales)  : '—');
  setText('an-worst-day', wkKPIs.worstDay || '—');
  setText('an-worst-val', wkKPIs.worstSales != null ? 'AED ' + fmtAED(wkKPIs.worstSales) : '—');
  setText('an-atv',    wkKPIs.wkAtv ? fmtAED(Math.round(wkKPIs.wkAtv)) : '—');
  setText('an-no7pct', fmtPct(wkKPIs.wkNo7Pct));

  // Forecast
  const fc = calcForecast(wkEntries, weekBP);
  if (fc) {
    setText('fc-proj', `AED ${fmtAED(Math.round(fc.projected))}`);
    setText('fc-text', `${fc.daysIn} day(s) entered · avg AED ${fmtAED(Math.round(fc.avgPerDay))}/day · ${fc.daysLeft} remaining`);
    const cls  = forecastBadgeClass(fc.projectedPct);
    const icon = fc.projectedPct >= 100 ? '🎯' : fc.projectedPct >= 85 ? '⚠️' : '⬇️';
    const badge = el('fc-badge');
    if (badge) badge.innerHTML = `<div class="forecast-badge ${cls}">${icon} ${fmtPct(fc.projectedPct)} projected</div>`;
  }

  // KPI progress bars
  const barsEl = el('kpi-bars');
  if (barsEl) {
    const kpis = [
      { label: 'Week Sales', val: wkKPIs.wkSales,  target: weekBP,        color: 'var(--mint)' },
      { label: 'Week No7',   val: wkKPIs.wkNo7,    target: n7WeeklyBP,    color: 'var(--blue)' },
      { label: 'Avg SFA',    val: wkKPIs.avgSfa,    target: 65, unit: '%', color: 'var(--purple)' },
      { label: 'AURA Capture', val: wkKPIs.wkAuraPct, target: 30, unit: '%', color: 'var(--mint)' },
    ];
    barsEl.innerHTML = kpis.map(k => {
      const pct  = k.val != null && k.target ? Math.min(100, (k.val / k.target) * 100) : 0;
      const col  = achColor(pct);
      const vFmt = k.unit === '%' ? fmtPct(k.val) : (k.val != null ? 'AED ' + fmtAED(k.val) : '—');
      const tFmt = k.unit === '%' ? fmtPct(k.target) : 'AED ' + fmtAED(k.target);
      return `<div style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;font-size:.72rem;font-weight:600;margin-bottom:5px">
          <span>${k.label}</span>
          <span class="mono" style="color:${col}">${vFmt} / ${tFmt}</span>
        </div>
        <div class="pbar-track"><div class="pbar-fill" style="width:${pct}%;background:${col}"></div></div>
        <div class="pbar-labels"><span>${pct.toFixed(0)}%</span><span>Target</span></div>
      </div>`;
    }).join('');
  }

  buildCharts(weekNum);
}

// ── Charts ────────────────────────────────────────────
const chartDefaults = {
  responsive: true,
  maintainAspectRatio: false,
  plugins: { legend: { position: 'top', labels: { font: { size: 10 }, boxWidth: 12, padding: 8 } } },
};
const gridOpts = { grid: { color: 'rgba(0,0,0,0.04)' }, ticks: { font: { size: 10 } } };

function buildCharts(wk) {
  buildSalesTrend(wk);
  buildNo7Chart(wk);
  buildAuraChart(wk);
}

function buildSalesTrend(wk) {
  const canvasEl = el('chart-sales-trend');
  if (!canvasEl) return;
  if (charts.sales) charts.sales.destroy();

  const wkBP = getWeekBP(wk);
  const datasets = [wk-2, wk-1, wk].map((w, i) => {
    if (w < 1) return null;
    const vals = DAYS.map(d => db.getEntry(w, d)?.sales || 0);
    const alpha = [0.3, 0.55, 0.9][i];
    return {
      label: `Week ${w}`,
      data: vals,
      backgroundColor: `rgba(0,200,150,${alpha})`,
      borderColor: `rgba(0,168,126,${alpha})`,
      borderWidth: i === 2 ? 2 : 1,
      borderRadius: 4,
    };
  }).filter(Boolean);

  // Add BP target line
  if (wkBP) {
    const dailyAvgBP = wkBP / 7;
    datasets.push({
      label: 'Daily BP avg',
      data: Array(7).fill(dailyAvgBP),
      type: 'line',
      borderColor: 'rgba(245,166,35,0.8)',
      borderWidth: 2,
      borderDash: [4, 4],
      pointRadius: 0,
      fill: false,
    });
  }

  charts.sales = new Chart(canvasEl, {
    type: 'bar',
    data: { labels: DAYS, datasets },
    options: {
      ...chartDefaults,
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 10 } } },
        y: { ...gridOpts, ticks: { ...gridOpts.ticks, callback: v => fmtAED(v) } },
      },
    },
  });
}

function buildNo7Chart(wk) {
  const canvasEl = el('chart-no7');
  if (!canvasEl) return;
  if (charts.no7) charts.no7.destroy();

  const data = DAYS.map(d => {
    const e = db.getEntry(wk, d) || {};
    return e.no7 && e.sales ? +((e.no7 / e.sales) * 100).toFixed(1) : 0;
  });

  charts.no7 = new Chart(canvasEl, {
    type: 'line',
    data: {
      labels: DAYS,
      datasets: [{
        label: 'No7 %',
        data,
        borderColor: 'rgba(74,144,217,1)',
        backgroundColor: 'rgba(74,144,217,0.1)',
        fill: true, tension: 0.4, borderWidth: 2, pointRadius: 4,
        pointBackgroundColor: 'rgba(74,144,217,1)',
      }],
    },
    options: {
      ...chartDefaults,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 10 } } },
        y: { ...gridOpts, ticks: { ...gridOpts.ticks, callback: v => v + '%' } },
      },
    },
  });
}

function buildAuraChart(wk) {
  const canvasEl = el('chart-aura');
  if (!canvasEl) return;
  if (charts.aura) charts.aura.destroy();

  const data = DAYS.map(d => {
    const e = db.getEntry(wk, d) || {};
    return e.aura && e.trn ? +((e.aura / e.trn) * 100).toFixed(1) : 0;
  });

  charts.aura = new Chart(canvasEl, {
    type: 'line',
    data: {
      labels: DAYS,
      datasets: [{
        label: 'AURA %',
        data,
        borderColor: 'rgba(0,200,150,1)',
        backgroundColor: 'rgba(0,200,150,0.1)',
        fill: true, tension: 0.4, borderWidth: 2, pointRadius: 4,
        pointBackgroundColor: 'rgba(0,200,150,1)',
      }],
    },
    options: {
      ...chartDefaults,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 10 } } },
        y: { ...gridOpts, ticks: { ...gridOpts.ticks, callback: v => v + '%' } },
      },
    },
  });
}

function buildStaffView() {
  const { weekNum } = store.settings;
  setText('stf-wk', weekNum);

  // Compute per-staff totals
  const ranked = store.staff.map(s => {
    const wkTotal = DAYS.reduce((sum, d) => {
      const e = (s.entries || {})[db.entryKey(weekNum, d)];
      return sum + (e?.no7 || 0);
    }, 0);
    return { ...s, wkTotal, pct: s.weeklyTarget ? (wkTotal / s.weeklyTarget) * 100 : 0 };
  }).sort((a, b) => b.pct - a.pct);

  // Team totals
  const teamTotal  = ranked.reduce((s, x) => s + x.wkTotal, 0);
  const teamTarget = ranked.reduce((s, x) => s + x.weeklyTarget, 0);
  const teamPct    = teamTarget ? (teamTotal / teamTarget) * 100 : 0;

  setText('stf-team-total',  'AED ' + fmtAED(teamTotal));
  setText('stf-team-target', 'AED ' + fmtAED(teamTarget));
  const pctEl = el('stf-team-pct');
  if (pctEl) { pctEl.textContent = fmtPct(teamPct); pctEl.style.color = achColor(teamPct); }
  const badge = el('stf-team-badge');
  if (badge) { badge.textContent = fmtPct(teamPct) + ' achieved'; badge.className = 'badge ' + achBadgeClass(teamPct); }

  // Render staff cards
  const isMaster = store.auth.role === 'master';
  const cardsEl  = el('staff-cards');
  if (cardsEl) {
    cardsEl.innerHTML = ranked.map((s, idx) => {
      const color    = AVATAR_COLORS[s.colorIdx % AVATAR_COLORS.length];
      const barColor = achColor(s.pct);
      const rankHtml = idx === 0 ? '<div class="rank-badge rank-1">1</div>'
                     : idx === 1 ? '<div class="rank-badge rank-2">2</div>'
                     : idx === 2 ? '<div class="rank-badge rank-3">3</div>'
                     : `<div class="rank-badge rank-n">${idx+1}</div>`;
      return `<div class="staff-card">
        <div class="staff-card-top">
          <div class="staff-info">
            ${rankHtml}
            <div class="staff-avatar" style="background:${color}20;color:${color}">${s.initials}</div>
            <div>
              <div class="staff-name">${s.name}</div>
              <div class="staff-role">No7 Specialist</div>
            </div>
          </div>
          ${isMaster ? `<button class="btn btn-outline btn-sm" data-staffid="${s.id}" onclick="window._openStaffEntry(${s.id})">+ Log</button>` : ''}
        </div>
        <div class="staff-nums">
          <div class="staff-num"><div class="staff-num-value" style="color:${color}">AED ${fmtAED(s.wkTotal)}</div><div class="staff-num-label">Achieved</div></div>
          <div class="staff-num"><div class="staff-num-value">AED ${fmtAED(s.weeklyTarget)}</div><div class="staff-num-label">Target</div></div>
          <div class="staff-num"><div class="staff-num-value" style="color:${barColor}">${fmtPct(s.pct)}</div><div class="staff-num-label">Achievement</div></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:.62rem;color:var(--text-2);margin-bottom:4px">
          <span>No7 Progress</span><span style="color:${barColor}">${fmtPct(s.pct)}</span>
        </div>
        <div class="pbar-track"><div class="pbar-fill" style="width:${Math.min(100,s.pct)}%;background:${barColor}"></div></div>
      </div>`;
    }).join('');
  }

  // Master entry panel binding
  window._openStaffEntry = (id) => openStaffEntry(id);
  el('btn-stf-save')?.addEventListener('click', saveStaffEntry);
  el('btn-stf-cancel')?.addEventListener('click', closeStaffEntry);
}

function openStaffEntry(id) {
  activeStaffId = id;
  const s = store.staff.find(x => x.id === id);
  setText('stf-entry-name', s?.name || '');
  const panel = el('staff-entry-panel');
  if (panel) {
    panel.hidden = false;
    panel.scrollIntoView({ behavior: 'smooth' });
  }
  el('stf-day').value = store.settings.currentDay;
  el('stf-no7').value = '';
  el('stf-no7trn').value = '';
}

function closeStaffEntry() {
  el('staff-entry-panel').hidden = true;
  activeStaffId = null;
}

function saveStaffEntry() {
  const s = store.staff.find(x => x.id === activeStaffId);
  if (!s) return;
  const no7    = gNum('stf-no7')    || 0;
  const no7trn = gNum('stf-no7trn') || 0;
  const day    = el('stf-day')?.value || store.settings.currentDay;
  const dayKey = db.entryKey(store.settings.weekNum, day);

  logStaffEntry(activeStaffId, dayKey, { no7, no7trn, by: store.auth.user });
  addAuditEntry('staff_entry', `${s.name}: No7 AED ${fmtAED(no7)} on ${day}`, store.auth.user, store.auth.role);
  toast(`✓ ${s.name} entry saved`, 'success');
  closeStaffEntry();
  buildStaffView();

  // Confetti if target beaten
  const { weekNum } = store.settings;
  const wkTotal = DAYS.reduce((sum, d) => {
    const e = (s.entries || {})[db.entryKey(weekNum, d)];
    return sum + (e?.no7 || 0);
  }, 0) + no7;
  if (wkTotal >= s.weeklyTarget && store.settings.features.confetti) {
    setTimeout(() => {
      const { celebrate } = import('../utils/ui.js');
      celebrate && celebrate('🏆');
    }, 300);
  }
}

          style="flex:1;height:40px;border:1.5px solid var(--border);border-radius:var(--r);padding:0 12px;font-size:.85rem;background:var(--bg);outline:none;font-family:var(--font-sans)">
        <button class="btn btn-primary btn-sm" id="btn-add-chk">+ Add</button>
      </div>
    </div>

    <!-- Feature toggles -->
    <div class="admin-section">
      <div class="admin-section-title">🔧 Feature Toggles</div>
      ${['ocr','confetti','staff','divisions','kd'].map(f => `
      <div class="admin-row">
        <span class="admin-row-label">${featureLabel(f)}</span>
        <button class="toggle" id="tog-${f}" aria-label="Toggle ${f}"></button>
      </div>`).join('')}
    </div>

    <!-- Export / Import -->
    <div class="admin-section">
      <div class="admin-section-title">📤 Export &amp; Backup</div>
      <div class="export-grid">
        <div class="export-btn" id="btn-export-csv"><div class="export-btn-icon">📊</div><div class="export-btn-label">Export CSV</div><div class="export-btn-sub">All weeks</div></div>
        <div class="export-btn" id="btn-export-json"><div class="export-btn-icon">🗂️</div><div class="export-btn-label">JSON Backup</div><div class="export-btn-sub">Full backup</div></div>
      </div>
      <div style="margin-top:10px">
        <label class="field-label" for="import-file">Import JSON Backup</label>
        <input type="file" id="import-file" accept=".json" style="margin-top:5px;font-size:.8rem">
      </div>
    </div>

    <!-- Audit trail -->
    <div class="admin-section">
      <div class="admin-section-title">🕐 Audit Trail <span style="font-size:.65rem;font-weight:500;color:var(--text-3)">(last 20)</span></div>
      <div id="audit-trail"></div>
    </div>

    <!-- Manager review -->
    <div class="admin-section">
      <div class="admin-section-title">✅ Manager Review &amp; Week Locks</div>
      <div id="review-weeks"></div>
    </div>

    <!-- Danger zone -->
    <div class="admin-section" style="border-color:var(--red);margin-top:16px">
      <div class="admin-section-title" style="color:var(--red)">⚠️ Danger Zone</div>
      <button class="btn btn-danger btn-full" id="btn-clear-all">Clear All Data</button>
    </div>
  </div>`;
}

function featureLabel(f) {
  return { ocr:'OCR / Photo Parsing', confetti:'Confetti on Target Beat', staff:'Staff Tracker', divisions:'Division Split View', kd:'KD Converter' }[f] || f;
}

// ── Populate form ─────────────────────────────────────
function populateForm() {
  const s = store.settings;
  setVal('adm-store', s.store);
  setVal('adm-wk',    s.weekNum);
  setVal('adm-dbp',   s.dbpOverride || '');
  setVal('adm-wbp',   s.wbpOverride || '');
  setVal('adm-n7dbp', s.n7DailyBP);
  setVal('adm-n7wbp', s.n7WeeklyBP);
  setVal('adm-kd',    s.kdRate);
  setVal('adm-diva',  s.divAPercent);

  // Toggles
  const feats = s.features || {};
  ['ocr','confetti','staff','divisions','kd'].forEach(f => {
    const tog = el('tog-' + f);
    if (tog) tog.classList.toggle('on', feats[f] !== false);
  });

  renderStaffList();
  renderChecklistAdmin();
  renderAuditTrail();
  renderReviewWeeks();
}

// ── Staff list (admin) ────────────────────────────────
function renderStaffList() {
  const container = el('admin-staff-list');
  if (!container) return;
  container.innerHTML = store.staff.map(s => `
    <div class="admin-row">
      <div>
        <div class="admin-row-label">${s.name}</div>
        <div class="admin-row-sub">Weekly No7 Target: AED ${fmtAED(s.weeklyTarget)}</div>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <input type="number" value="${s.weeklyTarget}"
          style="width:80px;height:32px;border:1.5px solid var(--border);border-radius:6px;padding:0 8px;font-size:.8rem;background:var(--bg);font-family:var(--font-mono);outline:none"
          onchange="window._updateStaffTarget(${s.id}, parseFloat(this.value))">
      </div>
    </div>`).join('');
  window._updateStaffTarget = (id, v) => { updateStaffTarget(id, v); };
}

// ── Checklist admin ───────────────────────────────────
function renderChecklistAdmin() {
  const container = el('admin-chk-list');
  if (!container) return;
  container.innerHTML = store.checklist.map((item, i) => `
    <div class="admin-row">
      <span class="admin-row-label">${item}</span>
      <button onclick="window._removeChk(${i})"
        style="background:none;border:none;color:var(--red);cursor:pointer;font-size:.72rem;font-weight:700">Remove</button>
    </div>`).join('');
  window._removeChk = (i) => { removeChecklistItem(i); renderChecklistAdmin(); };
}

// ── Audit trail ───────────────────────────────────────
function renderAuditTrail() {
  const container = el('audit-trail');
  if (!container) return;
  const log = store.auditLog.slice(0, 20);
  container.innerHTML = log.length
    ? log.map(a => `
      <div class="audit-item">
        <div class="audit-dot"></div>
        <div class="audit-body"><strong>${a.action.replace(/_/g,' ')}</strong><br>${a.detail} <span style="color:var(--text-3)">· ${a.user}</span></div>
        <div class="audit-ts">${fmtDateTime(a.ts)}</div>
      </div>`).join('')
    : '<div style="font-size:.78rem;color:var(--text-3);padding:8px 0">No audit entries yet.</div>';
}

// ── Week review/lock ──────────────────────────────────
function renderReviewWeeks() {
  const container = el('review-weeks');
  if (!container) return;
  const wk = store.settings.weekNum;
  const weeks = [wk-2, wk-1, wk].filter(w => w > 0);
  container.innerHTML = weeks.map(w => {
    const locked = store.weekLocks[w];
    return `<div class="admin-row">
      <span class="admin-row-label">Week ${w}</span>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="badge ${locked ? 'badge-red' : 'badge-mint'}">${locked ? '🔒 Locked' : '✓ Open'}</span>
        <button class="btn btn-outline btn-sm" onclick="window._toggleLock(${w})">${locked ? 'Unlock' : 'Lock'}</button>
      </div>
    </div>`;
  }).join('');
  window._toggleLock = (w) => {
    const now = toggleWeekLock(w);
    addAuditEntry(`week_${now?'locked':'unlocked'}`, `Week ${w}`, store.auth.user, store.auth.role);
    renderReviewWeeks();
    toast((now ? `🔒 Week ${w} locked` : `🔓 Week ${w} unlocked`), 'success');
  };
}

// ── Event binding ─────────────────────────────────────
function bindEvents() {
  // Save settings
  el('btn-save-settings')?.addEventListener('click', () => {
    saveSettings({
      store:        gStr('adm-store') || store.settings.store,
      weekNum:      parseInt(el('adm-wk')?.value) || store.settings.weekNum,
      dbpOverride:  gNum('adm-dbp'),
      wbpOverride:  gNum('adm-wbp'),
      n7DailyBP:    gNum('adm-n7dbp') || store.settings.n7DailyBP,
      n7WeeklyBP:   gNum('adm-n7wbp') || store.settings.n7WeeklyBP,
      kdRate:       gNum('adm-kd')    || store.settings.kdRate,
      divAPercent:  gNum('adm-diva')  || store.settings.divAPercent,
    });
    addAuditEntry('settings_saved', `Week ${store.settings.weekNum}`, store.auth.user, store.auth.role);
    toast('✓ Settings saved', 'success');
  });

  // Add staff
  el('btn-add-staff')?.addEventListener('click', () => {
    const name = prompt('Staff member name:');
    if (!name?.trim()) return;
    addStaffMember(name.trim());
    renderStaffList();
    toast('✓ ' + name + ' added', 'success');
  });

  // Checklist add
  el('btn-add-chk')?.addEventListener('click', () => {
    const val = el('new-chk-item')?.value?.trim();
    if (!val) return;
    addChecklistItem(val);
    el('new-chk-item').value = '';
    renderChecklistAdmin();
    toast('Item added');
  });
  el('new-chk-item')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') el('btn-add-chk')?.click();
  });

  // Toggles
  ['ocr','confetti','staff','divisions','kd'].forEach(f => {
    el('tog-'+f)?.addEventListener('click', function() {
      toggleFeature(f);
      this.classList.toggle('on');
      toast(`${featureLabel(f)} ${store.settings.features[f] ? 'enabled' : 'disabled'}`);
    });
  });

  // Export
  el('btn-export-csv')?.addEventListener('click', () => { exportCSV(); toast('✓ CSV exported', 'success'); });
  el('btn-export-json')?.addEventListener('click', () => { exportJSON(); toast('✓ JSON exported', 'success'); });

  // Import
  el('import-file')?.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const text = await file.text();
    const result = importJSON(text);
    if (result.ok) toast(`✓ Imported ${result.count} keys`, 'success');
    else toast('Import failed: ' + result.error, 'error');
    e.target.value = '';
  });

  // Clear all
  el('btn-clear-all')?.addEventListener('click', () => {
    if (confirm('⚠️ Clear ALL app data? This cannot be undone.\n\nMake a JSON backup first.')) {
      db.clearAll();
      toast('All data cleared');
      setTimeout(() => location.reload(), 800);
    }
  });
}

// ═══ js/app.js ═══
/**
 * js/app.js — Application bootstrap, router, nav, checklist.
 */










// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// Nav config
const NAV = [
  { id:'entry',    label:'Entry',    icon:'entry',    masterOnly:false },
  { id:'analysis', label:'Analysis', icon:'analysis', masterOnly:false },
  { id:'staff',    label:'Staff',    icon:'staff',    masterOnly:false },
  { id:'admin',    label:'Admin',    icon:'admin',    masterOnly:false },
];

// Bootstrap
document.addEventListener('DOMContentLoaded', () => {
  initLogin(onLoginSuccess);
});

function onLoginSuccess(authResult) {
  loadAll();
  el('screen-login').hidden = true;
  el('screen-app').hidden   = false;

  buildNav(authResult.role);
  renderEntry();
  showView('entry');

  if (el('role-badge'))
    el('role-badge').textContent = 'Admin';

  if (el('sidebar-user-chip'))
    el('sidebar-user-chip').textContent = 'Admin · Full Access';

  const now = new Date();
  if (el('header-sub'))
    el('header-sub').textContent =
      now.toLocaleDateString('en-AE',{day:'2-digit',month:'long',year:'numeric'}) + ' · UAE';

  updateSyncBar({ online: networkStatus.isOnline });
  networkStatus.subscribe(online => updateSyncBar({ online, pendingSync: pendingCount() }));

  el('btn-logout-desktop')?.addEventListener('click', doLogout);
  el('btn-logout-mobile')?.addEventListener('click',  doLogout);
  el('btn-checklist-toggle')?.addEventListener('click', toggleChecklist);
  bindKeyboard();

  const h = now.getHours();
  const greet = h < 12 ? 'Good morning' : h < 18 ? 'Good afternoon' : 'Good evening';
  toast(greet + ', ' + authResult.user + '!', 'success');
}

// Nav build
function buildNav(role) {
  const visible = NAV;

  const sidebar = el('sidebar-nav');
  if (sidebar) {
    sidebar.innerHTML = visible.map(n =>
      '<button class="sidebar-nav-item" data-view="' + n.id + '">' + getIcon(n.icon) + ' ' + n.label + '</button>'
    ).join('');
    sidebar.querySelectorAll('.sidebar-nav-item').forEach(btn =>
      btn.addEventListener('click', () => showView(btn.dataset.view)));
  }

  const bottom = el('bottom-nav');
  if (bottom) {
    bottom.innerHTML = visible.map(n =>
      '<button class="bottom-nav-item" data-view="' + n.id + '">' + getIcon(n.icon) + '<span>' + n.label + '</span><span class="nav-pip"></span></button>'
    ).join('');
    bottom.querySelectorAll('.bottom-nav-item').forEach(btn =>
      btn.addEventListener('click', () => showView(btn.dataset.view)));
  }
}

// Router
let currentView = null;

function showView(id) {
  currentView = id;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  const viewEl = el('view-' + id);
  if (viewEl) viewEl.classList.add('active');

  switch (id) {
    case 'entry':    renderEntry();    break;
    case 'analysis': renderAnalysis(); break;
    case 'staff':    renderStaff();    break;
    case 'admin':    renderAdmin();    break;
  }

  document.querySelectorAll('.sidebar-nav-item, .bottom-nav-item').forEach(b =>
    b.classList.toggle('active', b.dataset.view === id));

  const titles = { entry:'Entry', analysis:'Analysis', staff:'Staff Tracker', admin:'Admin' };
  setText('header-title', titles[id] || id);
}

// Logout
function doLogout() {
  clearSession();
  setAuth({ loggedIn:false, role:null, user:null });
  el('screen-app').hidden   = true;
  el('screen-login').hidden = false;
  if (el('input-pin')) el('input-pin').value = '';
  currentView = null;
}

// Checklist
let checklistOpen = false;

function toggleChecklist() {
  checklistOpen = !checklistOpen;
  const panel = el('checklist-panel');
  if (!panel) return;
  panel.classList.toggle('open', checklistOpen);
  if (checklistOpen) renderChecklistPanel();
}

function renderChecklistPanel() {
  const inner = el('checklist-panel-inner');
  if (!inner) return;

  const items     = store.checklist;
  const done      = store.checklistDone;
  const doneCount = Object.values(done).filter(Boolean).length;
  const total     = items.length;
  const pct       = total ? (doneCount / total) * 100 : 0;

  inner.innerHTML =
    '<div class="checklist-title">' +
      '<span>Checklist</span>' +
      '<span style="font-size:.7rem;color:var(--mint-dark);font-weight:700">' + doneCount + '/' + total + '</span>' +
    '</div>' +
    '<div class="checklist-progress">' +
      '<div class="checklist-progress-fill" style="width:' + pct + '%"></div>' +
    '</div>' +
    '<div class="checklist-items">' +
      items.map(function(item, i) {
        return '<div class="chk-item ' + (done[i] ? 'done' : '') + '" data-idx="' + i + '">' +
          '<div class="chk-icon">' + (done[i] ? '&#10003;' : '') + '</div>' +
          '<span class="chk-text">' + item + '</span>' +
        '</div>';
      }).join('') +
    '</div>' +
    '<button class="btn btn-primary btn-full" style="margin-top:12px" id="btn-chk-confirm">' +
      '&#10003; Mark Complete</button>';

  inner.querySelectorAll('.chk-item').forEach(function(item) {
    item.addEventListener('click', function() {
      toggleChecklistItem(parseInt(item.dataset.idx));
      renderChecklistPanel();
    });
  });

  el('btn-chk-confirm')?.addEventListener('click', function() {
    if (doneCount < total) { toast('Complete all items first', 'error'); return; }
    addAuditEntry('checklist_confirmed', total + ' items', store.auth.user, store.auth.role);
    toast('Checklist complete!', 'success');
    checklistOpen = false;
    el('checklist-panel').classList.remove('open');
  });
}

// Keyboard
let lastTabTime = 0;
function bindKeyboard() {
  document.addEventListener('keydown', function(e) {
    const tag = e.target.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
    if (e.key === 'Tab') {
      e.preventDefault();
      const now = Date.now();
      if (now - lastTabTime < 400) toggleChecklist();
      lastTabTime = now;
    }
  });
}

    analysis: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="18" height="18"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>',
    staff:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="18" height="18"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>',
    admin:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="18" height="18"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>',

  return icons[name] || '';
