<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#00c896" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="No7 Analytics" />

  <title>No7 · Sales Analytics</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
</head>

<body>

  <!-- ═════════ LOGIN SCREEN ═════════ -->
  <div id="screen-login" class="screen active">
    <div class="login-bg">
      <div class="login-card">

        <div class="login-logo">
          <div class="logo-mark">N7</div>
          <div class="login-logo-text">
            <h1>No7 Analytics</h1>
            <p>Dubai Airport T3 · Sales Platform</p>
          </div>
        </div>

        <div class="alert alert-error" id="login-error" hidden></div>

        <div class="field">
          <label class="field-label" for="input-pin">Enter PIN</label>
          <input
            class="field-input"
            type="password"
            id="input-pin"
            placeholder="····"
            maxlength="4"
            inputmode="numeric"
            style="text-align:center;font-size:2rem;letter-spacing:.5em;height:64px"
          />
        </div>

        <button class="btn btn-primary btn-block" id="btn-login">
          Unlock
        </button>

      </div>
    </div>
  </div>


  <!-- ═════════ MAIN APP SCREEN ═════════ -->
  <div id="screen-app" class="screen">

    <div class="app-shell">

      <!-- Header -->
      <header class="app-header">
        <div class="app-title">
          <span id="header-title">No7 Analytics</span>
        </div>

        <div class="app-meta">
          <span class="sync-dot" id="sync-dot"></span>
          <span id="sync-text">Saved locally</span>
        </div>
      </header>

      <!-- Views -->
      <main class="view-container" id="view-container">
        <div class="view" id="view-entry"></div>
        <div class="view" id="view-analysis"></div>
        <div class="view" id="view-staff"></div>
        <div class="view" id="view-admin"></div>
      </main>

      <!-- Bottom Navigation -->
      <nav class="bottom-nav" id="bottom-nav"></nav>

    </div>
  </div>


  <!-- ═════════ GLOBAL UI ELEMENTS ═════════ -->

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <div class="success-overlay" id="success-overlay">
    <div class="success-burst" id="success-burst">🎯</div>
  </div>

  <!-- Camera Input -->
  <input
    type="file"
    id="camera-input"
    accept="image/*"
    capture="environment"
    hidden
  />


  <!-- ═════════ CDN LIBRARIES ═════════ -->

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>


  <!-- ═════════ MAIN APP MODULE ═════════ -->

  <script type="module" src="js/app.js"></script>


  <!-- ═════════ OPTIONAL SERVICE WORKER ═════════ -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .catch(err => console.log('SW registration failed:', err));
      });
    }
  </script>

</body>
</html>
